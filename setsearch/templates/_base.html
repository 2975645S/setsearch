{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <!-- todo: optimise bundle -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
          rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }
    </style>

    <title>{% block title %}SetSearch{% endblock %}</title>
</head>
<body class="flex flex-col min-h-screen bg-base-100">

<!-- Navbar -->
<nav class="navbar bg-base-200 border-b border-base-300 px-6">
    <div class="flex-1">
        <a href="{% url "home" %}" class="text-xl font-bold tracking-tight hover:opacity-80">
            SetSearch
        </a>
    </div>

    <div class="flex-none">
        <ul class="menu menu-horizontal gap-1">
            {% if request.user.is_authenticated %}
                <li>
                    <a class="btn btn-ghost btn-sm" href="{% url "logout" %}">
                        Logout
                    </a>
                </li>
            {% else %}
                <li>
                    <a class="btn btn-ghost btn-sm" href="{% url "login" %}">
                        Login
                    </a>
                </li>
                <li>
                    <a class="btn btn-primary btn-sm" href="{% url "signup" %}">
                        Sign up
                    </a>
                </li>
            {% endif %}
        </ul>
    </div>
</nav>

<!-- Page content -->
<main class="flex-grow">
    <div class="max-w-5xl mx-auto px-6 py-10">
        {% block content %}
        {% endblock %}
    </div>
</main>

<!-- Footer -->
<footer class="border-t border-base-300 bg-base-200">
    <div class="max-w-5xl mx-auto px-6 py-6 flex flex-col sm:flex-row justify-between items-center gap-2 text-sm opacity-80">
        <p>
            © {% now "Y" %} SetSearch
        </p>
        <p>
            Built with Django
        </p>
    </div>
</footer>

{% block script %}
{% endblock %}

</body>
</html>
</html>
