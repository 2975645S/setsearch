{% extends "_base.html" %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card text-center shadow-sm">
                {% if artist.picture %}
                    <img src="https://commons.wikimedia.org/wiki/Special:FilePath/{{ artist.picture }}"
                         class="card-img-top" alt="{{ artist.name }}"/>
                {% endif %}
                <div class="card-body">
                    <h3 class="card-title">{{ artist.name }}</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <h4 class="mb-3">Concerts</h4>
            {% if concerts %}
                <ul class="list-group">
                    {% for concert in concerts %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <a href="{% url "concert" concert.artist.slug concert.slug %}">{{ concert.title }}</a>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p class="text-muted">No concerts listed yet.</p>
            {% endif %}
        </div>
    </div>
{% endblock %}
