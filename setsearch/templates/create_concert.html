{% extends "_select2.html" %}
{% load django_bootstrap5 %}

{% block title %}SetSearch - Create a Concert{% endblock title %}

{% block content %}
    <div class="mx-auto form-container">
        <h1>Create a Concert</h1>

        <form method="post">
            {% csrf_token %}
            {% bootstrap_form form %}

            {% bootstrap_button button_type="submit" content="Create concert" %}
        </form>
    </div>
{% endblock %}
